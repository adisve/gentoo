env:
  
  TERM: alacritty
  LANG: "en_US.UTF-8"
  LC_CTYPE: en_US.UTF-8
 
window:
  padding:
   x: 25
   y: 20



font:
  offset:
      x: 1    # For letter spacing.
      y: 0    # For line spacing. 
  normal:

    family: FiraCode Nerd Font

    style: Regular

  size: 11
  use_thin_strokes: true
colors:
  name: astromouse
  author: ""
  primary:
    background: "#1b0029"
    foreground: "#FDFFFF"
  cursor:
    text: "#FDFFFF"
    cursor: "#ffffff"
  normal:
    black: "#525252"
    red: "#FF6978"
    green: "#62A87C"
    yellow: "#F7B801"
    blue: "#788BFF"
    purple: "#462255"
    magenta: "#BC96E6"
    cyan: "#B7C0EE"
    white: "#f7f9fb"
  bright:
    black: "#776787"
    red: "#d28abf"
    green: "#8fb676"
    yellow: "#c8bc45"
    blue: "#8fa7b9"
    magenta: "#bd89de"
    cyan: "#6ec2a8"
    white: "#dad3d3"
theme: Astromouse
